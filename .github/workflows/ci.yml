name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "gofmt required:"
            echo "$files"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Integration test skeleton
        run: go test -tags=integration ./tests/integration

      - name: Vulnerability scan
        run: make vulncheck

      - name: Build
        run: go build -buildvcs=false -trimpath -ldflags "-s -w -X main.version=ci -X main.commit=${GITHUB_SHA::12} -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o bin/aifar-runtime ./cmd/aifar-runtime

      - name: Release package smoke test
        run: make release VERSION=ci COMMIT=${GITHUB_SHA::12} BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

      - name: Upload release smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aifar-runtime-ci-release
          path: |
            dist/*.tar.gz
            dist/checksums.txt
            dist/manifest.json
            dist/sbom.spdx.json
